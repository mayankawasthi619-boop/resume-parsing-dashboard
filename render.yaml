services:
  # 1. Spring Boot Backend Web Service (Deployed via Docker)
  - type: web
    name: resume-parser-backend
    env: docker
    rootDir: backend
    envVars:
      - key: FRONTEND_URL
        fromService:
          name: resume-parser-frontend
          type: web
          property: host

  # 2. React Frontend Static Site
  - type: web
    name: resume-parser-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resume-parser-backend
          type: web
          property: host
