services:
  # 1. Spring Boot Backend Web Service
  - type: web
    name: resume-parser-backend
    env: java
    rootDir: backend
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/app.jar
    envVars:
      - key: FRONTEND_URL
        fromService:
          name: resume-parser-frontend
          type: web
          property: url

  # 2. React Frontend Static Site
  - type: web
    name: resume-parser-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resume-parser-backend
          type: web
          property: url
