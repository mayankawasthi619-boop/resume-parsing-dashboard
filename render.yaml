services:
  # 1. Spring Boot Backend Web Service (Free Tier via Docker)
  - type: web
    name: resume-parser-backend
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: FRONTEND_URL
        fromService:
          name: resume-parser-frontend
          type: web
          property: host

  # 2. React Frontend Static Site (Always Free - no plan field needed)
  - type: web
    name: resume-parser-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: resume-parser-backend
          type: web
          property: host
